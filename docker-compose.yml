services:
  converter:
    build: .
    container_name: audio-converter
    ports:
      - "8000:8000"
    volumes:
      - ./tmp:/tmp/convert
    restart: unless-stopped
    environment:
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=changeme
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3